<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CH7N — لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #080e1c;
      --bg-card: rgba(255,255,255,0.04);
      --blue:    #1877F2;
      --blue-dim:rgba(24,119,242,0.12);
      --gold:    #f5c842;
      --green:   #22c55e;
      --red:     #ef4444;
      --amber:   #f59e0b;
      --border:  rgba(24,119,242,0.15);
      --border-h:rgba(24,119,242,0.35);
      --text-1:  #eaf1ff;
      --text-2:  #7a98c0;
      --r-md:    12px;
      --r-lg:    18px;
      --ease:    cubic-bezier(0.4,0,0.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      direction: rtl;
      min-height: 100vh;
    }
    button { font-family: 'Cairo', sans-serif; cursor: pointer; border: none; background: none; }
    input, select { font-family: 'Cairo', sans-serif; }

    /* ══ LOGIN ══ */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border-h);
      border-radius: var(--r-lg); padding: 36px 28px; width: 100%; max-width: 360px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 900;
      color: var(--blue); letter-spacing: 4px; margin-bottom: 6px;
    }
    .login-sub { font-size: 0.8rem; color: var(--text-2); margin-bottom: 28px; }
    .login-input {
      width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: var(--r-md);
      color: var(--text-1); font-size: 0.95rem; outline: none; margin-bottom: 14px;
      transition: border-color 0.25s;
    }
    .login-input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%; padding: 13px; border-radius: var(--r-md);
      background: linear-gradient(135deg, var(--blue), #0d5fcb);
      color: white; font-size: 0.95rem; font-weight: 800;
      box-shadow: 0 4px 20px rgba(24,119,242,0.3); transition: all 0.25s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(24,119,242,0.5); }
    .login-err { color: var(--red); font-size: 0.78rem; margin-top: 10px; display: none; }

    /* ══ DASHBOARD ══ */
    #dashboard { display: none; }

    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,14,28,0.95); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px); padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-brand { font-family: 'Orbitron', monospace; font-size: 1.1rem; font-weight: 900; color: var(--blue); letter-spacing: 3px; }
    .topbar-sub { font-size: 0.65rem; color: var(--text-2); margin-top: 1px; }
    .topbar-logout {
      padding: 6px 14px; border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-2); font-size: 0.72rem; font-weight: 600;
      transition: all 0.2s;
    }
    .topbar-logout:hover { border-color: var(--red); color: var(--red); }

    .main { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }

    /* stats */
    .stats-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
    @media(min-width:540px){ .stats-row { grid-template-columns: repeat(4,1fr); } }
    .stat-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 16px 12px; text-align: center;
    }
    .stat-num { font-family: 'Orbitron', monospace; font-size: 1.4rem; font-weight: 900; }
    .stat-lbl { font-size: 0.65rem; color: var(--text-2); font-weight: 600; margin-top: 3px; }

    /* filters */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center;
    }
    .filter-btn {
      padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 700;
      border: 1px solid var(--border); color: var(--text-2); transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--border-h); color: var(--text-1); }
    .filter-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
    .search-input {
      flex: 1; min-width: 160px; padding: 7px 14px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text-1); font-size: 0.78rem; outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--blue); }

    /* orders */
    .orders-grid { display: flex; flex-direction: column; gap: 10px; }

    .order-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 16px; transition: border-color 0.2s;
    }
    .order-card:hover { border-color: var(--border-h); }

    .oc-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
    }
    .oc-num { font-family: 'Orbitron', monospace; font-size: 0.82rem; color: var(--blue); font-weight: 700; }
    .oc-date { font-size: 0.7rem; color: var(--text-2); }

    .oc-body { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
    @media(min-width:480px){ .oc-body { grid-template-columns: repeat(3,1fr); } }

    .oc-field { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px 10px; }
    .oc-field-lbl { font-size: 0.62rem; color: var(--text-2); font-weight: 600; margin-bottom: 2px; }
    .oc-field-val { font-size: 0.82rem; font-weight: 700; color: var(--text-1); }
    .oc-field-val.green { color: var(--green); }
    .oc-field-val.blue  { color: var(--blue); }

    .oc-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700;
    }
    .status-pending    { background: rgba(245,158,11,0.12); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
    .status-processing { background: rgba(24,119,242,0.12); color: var(--blue);  border: 1px solid rgba(24,119,242,0.25); }
    .status-done       { background: rgba(34,197,94,0.12);  color: var(--green); border: 1px solid rgba(34,197,94,0.25);  }
    .status-cancelled  { background: rgba(239,68,68,0.12);  color: var(--red);   border: 1px solid rgba(239,68,68,0.25);  }

    .status-select {
      padding: 6px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text-1); font-size: 0.75rem; font-weight: 600; outline: none;
      transition: border-color 0.2s; cursor: pointer;
    }
    .status-select:focus { border-color: var(--blue); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-2); font-size: 0.88rem;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }

    /* toast */
    .toast {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: var(--green); color: white; padding: 10px 22px;
      border-radius: 10px; font-size: 0.82rem; font-weight: 700;
      opacity: 0; transition: all 0.35s; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* loading */
    .loading { text-align: center; padding: 40px; color: var(--text-2); }
    .spin { display: inline-block; width: 28px; height: 28px; border: 3px solid rgba(24,119,242,0.2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* realtime dot */
    .live-dot { display: inline-block; width: 7px; height: 7px; background: var(--green); border-radius: 50%; margin-left: 6px; animation: pulse-green 2s ease infinite; }
    @keyframes pulse-green { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5);}50%{box-shadow:0 0 0 5px rgba(34,197,94,0);} }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">CH7N</div>
    <div class="login-sub">لوحة تحكم الإدارة</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="كلمة المرور" />
    <button class="login-btn" onclick="doLogin()">دخول</button>
    <div class="login-err" id="login-err">❌ كلمة مرور خاطئة</div>
  </div>
</div>

<!-- ══ DASHBOARD ══ -->
<div id="dashboard">
  <div class="topbar">
    <div>
      <div class="topbar-brand">CH7N <span class="live-dot"></span></div>
      <div class="topbar-sub">لوحة التحكم — مباشر</div>
    </div>
    <button class="topbar-logout" onclick="doLogout()">خروج</button>
  </div>

  <div class="main">

    <!-- إحصائيات -->
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="s-total" style="color:var(--blue)">0</div>
        <div class="stat-lbl">إجمالي الطلبات</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="s-today" style="color:var(--gold)">0</div>
        <div class="stat-lbl">طلبات اليوم</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="s-pending" style="color:var(--amber)">0</div>
        <div class="stat-lbl">قيد المراجعة</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="s-revenue" style="color:var(--green)">0</div>
        <div class="stat-lbl">إيرادات MRU</div>
      </div>
    </div>

    <!-- فلاتر -->
    <div class="filters">
      <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث باسم أو رقم..." oninput="renderOrders()" />
      <button class="filter-btn active" onclick="setFilter('all', this)">الكل</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">⏳ معلق</button>
      <button class="filter-btn" onclick="setFilter('processing', this)">⚡ جاري</button>
      <button class="filter-btn" onclick="setFilter('done', this)">✅ تم</button>
      <button class="filter-btn" onclick="setFilter('cancelled', this)">❌ ملغي</button>
    </div>

    <!-- الطلبات -->
    <div class="orders-grid" id="orders-grid">
      <div class="loading"><div class="spin"></div></div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBHZny2e1ApfFKEG_BQBcvkBMRdEP4moEY",
    authDomain: "ch7n-4c3cf.firebaseapp.com",
    projectId: "ch7n-4c3cf",
    storageBucket: "ch7n-4c3cf.firebasestorage.app",
    messagingSenderId: "823911686322",
    appId: "1:823911686322:web:e6a3cf5112c8b498f269ab"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── حالة ──
  window._allOrders  = [];
  window._filter     = 'all';

  // ── تحميل الطلبات realtime ──
  function loadOrders() {
    const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
    onSnapshot(q, snap => {
      window._allOrders = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderOrders();
    });
  }

  // ── تحديث الحالة ──
  window.changeStatus = async function(orderId, newStatus) {
    try {
      await updateDoc(doc(db, 'orders', orderId), {
        status: newStatus,
        updatedAt: serverTimestamp()
      });
      showToast('✅ تم تحديث الحالة');
    } catch(e) {
      showToast('❌ فشل التحديث');
    }
  };

  // ── إحصائيات ──
  function updateStats() {
    const orders  = window._allOrders;
    const today   = new Date().toDateString();
    const todayOrders = orders.filter(o => o.createdAt?.toDate?.()?.toDateString() === today);
    const pending     = orders.filter(o => o.status === 'pending');
    const revenue     = orders.filter(o => o.status === 'done').reduce((s, o) => s + (o.price || 0), 0);

    document.getElementById('s-total').textContent   = orders.length;
    document.getElementById('s-today').textContent   = todayOrders.length;
    document.getElementById('s-pending').textContent = pending.length;
    document.getElementById('s-revenue').textContent = revenue.toLocaleString('en-US');
  }

  // ── رسم الطلبات ──
  window.renderOrders = function() {
    const search  = document.getElementById('search-input')?.value.toLowerCase() || '';
    const filter  = window._filter;
    let orders    = window._allOrders;

    if (filter !== 'all') orders = orders.filter(o => o.status === filter);
    if (search) orders = orders.filter(o =>
      (o.userName || '').toLowerCase().includes(search) ||
      (o.userPhone || '').includes(search) ||
      (o.orderNum  || '').toLowerCase().includes(search)
    );

    const grid = document.getElementById('orders-grid');
    if (!orders.length) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>لا توجد طلبات</div>';
      return;
    }

    const statusMap = {
      pending:    { cls: 'status-pending',    label: '⏳ قيد المراجعة' },
      processing: { cls: 'status-processing', label: '⚡ جارٍ الشحن'   },
      done:       { cls: 'status-done',       label: '✅ تم الشحن'      },
      cancelled:  { cls: 'status-cancelled',  label: '❌ ملغي'          },
    };

    grid.innerHTML = orders.map(o => {
      const st   = statusMap[o.status] || statusMap.pending;
      const date = o.createdAt?.toDate?.()?.toLocaleString('ar-SA', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }) || '—';
      return `
        <div class="order-card">
          <div class="oc-top">
            <div>
              <div class="oc-num">#${o.orderNum || o.id.slice(-6).toUpperCase()}</div>
              <div class="oc-date">${date}</div>
            </div>
            <span class="status-badge ${st.cls}">${st.label}</span>
          </div>
          <div class="oc-body">
            <div class="oc-field">
              <div class="oc-field-lbl">الزبون</div>
              <div class="oc-field-val blue">${o.userName || '—'}</div>
            </div>
            <div class="oc-field">
              <div class="oc-field-lbl">الهاتف</div>
              <div class="oc-field-val" style="direction:ltr;text-align:right">${o.userPhone || '—'}</div>
            </div>
            <div class="oc-field">
              <div class="oc-field-lbl">اللعبة</div>
              <div class="oc-field-val">${o.game || '—'}</div>
            </div>
            <div class="oc-field">
              <div class="oc-field-lbl">الباقة</div>
              <div class="oc-field-val">${o.package || '—'}</div>
            </div>
            <div class="oc-field">
              <div class="oc-field-lbl">السعر</div>
              <div class="oc-field-val green">${o.price || '—'} MRU</div>
            </div>
            <div class="oc-field">
              <div class="oc-field-lbl">معرف اللاعب</div>
              <div class="oc-field-val" style="direction:ltr;text-align:right;font-size:0.72rem">${o.playerId || '—'}</div>
            </div>
            <div class="oc-field">
              <div class="oc-field-lbl">طريقة الدفع</div>
              <div class="oc-field-val">${o.payment || '—'}</div>
            </div>
            <div class="oc-field">
              <div class="oc-field-lbl">رقم المحول</div>
              <div class="oc-field-val" style="direction:ltr;text-align:right">${o.sender || '—'}</div>
            </div>
          </div>
          <div class="oc-bottom">
            <select class="status-select" onchange="changeStatus('${o.id}', this.value)">
              <option value="pending"    ${o.status==='pending'    ? 'selected':''}>⏳ قيد المراجعة</option>
              <option value="processing" ${o.status==='processing' ? 'selected':''}>⚡ جارٍ الشحن</option>
              <option value="done"       ${o.status==='done'       ? 'selected':''}>✅ تم الشحن</option>
              <option value="cancelled"  ${o.status==='cancelled'  ? 'selected':''}>❌ ملغي</option>
            </select>
          </div>
        </div>`;
    }).join('');
  };

  // ── فلتر ──
  window.setFilter = function(f, btn) {
    window._filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  };

  // ── Toast ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── تسجيل الدخول ──
  window.doLogin = function() {
    const pwd = document.getElementById('pwd-input').value;
    if (pwd === 'ch7n8.8topup') {
      sessionStorage.setItem('dash_auth', '1');
      document.getElementById('login-wrap').style.display = 'none';
      document.getElementById('dashboard').style.display  = 'block';
      loadOrders();
    } else {
      document.getElementById('login-err').style.display = 'block';
    }
  };

  window.doLogout = function() {
    sessionStorage.removeItem('dash_auth');
    document.getElementById('login-wrap').style.display = 'flex';
    document.getElementById('dashboard').style.display  = 'none';
    document.getElementById('pwd-input').value = '';
  };

  // ── Enter على كلمة المرور ──
  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });

  // ── تحقق من الجلسة ──
  if (sessionStorage.getItem('dash_auth') === '1') {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('dashboard').style.display  = 'block';
    loadOrders();
  }
</script>
</body>
</html>
